# Docker Compose – Multi-Agent Email Threat Analysis System
# Tested with Docker Desktop 4.x (Windows/Mac) and Docker Engine 24+ (Linux)
#
# Quick start:
#   cp .env.example .env          # fill in API keys
#   docker compose up -d          # start all services
#   docker compose logs -f        # tail logs
#
# Services & ports:
#   Frontend  → http://localhost:80
#   Backend   → http://localhost:8000  (API docs: /redoc)
#   Neo4j     → http://localhost:7474
#   Grafana   → http://localhost:3001  (admin / admin123)
#   Prometheus→ http://localhost:9090

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: eta_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: emailthreat
      POSTGRES_USER: emailthreat
      POSTGRES_PASSWORD: emailthreat
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emailthreat -d emailthreat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eta_network

  # ─── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: eta_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eta_network

  # ─── Neo4j ───────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.20-community
    container_name: eta_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/emailthreat123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - eta_network

  # ─── Backend API ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: eta_backend:latest
    container_name: eta_backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false   # optional – all critical vars are set in 'environment' below
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://emailthreat:emailthreat@postgres:5432/emailthreat
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=emailthreat123
      - ALLOWED_ORIGINS=["http://localhost:80","http://localhost:3000","http://frontend:80"]
      - ML_MODEL_DIR=/app/ml_models
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Neo4j is optional at startup – backend handles its absence gracefully
    volumes:
      - ml_models:/app/ml_models
    healthcheck:
      # /health returns 200 even when Neo4j is still starting (status=degraded).
      # Timeout raised to 10 s so slow Neo4j probes don't abort the curl.
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s   # give uvicorn + DB init time to finish
    networks:
      - eta_network

  # ─── Celery Worker (RLHF training + async tasks) ─────────────────────────
  celery_worker:
    image: eta_backend:latest   # reuse the image built by the backend service
    container_name: eta_celery
    restart: unless-stopped
    # Fixed module path: app.workers.celery_app (not app.worker)
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=celery
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql+asyncpg://emailthreat:emailthreat@postgres:5432/emailthreat
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=emailthreat123
      - ML_MODEL_DIR=/app/ml_models
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ml_models:/app/ml_models
    networks:
      - eta_network

  # ─── Celery Beat (periodic tasks – auto RLHF training every 6 h) ─────────
  celery_beat:
    image: eta_backend:latest   # reuse the image built by the backend service
    container_name: eta_celery_beat
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql+asyncpg://emailthreat:emailthreat@postgres:5432/emailthreat
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ML_MODEL_DIR=/app/ml_models
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ml_models:/app/ml_models
    networks:
      - eta_network

  # ─── Frontend Dashboard ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: eta_frontend:latest
    container_name: eta_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - eta_network

  # ─── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: eta_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - "9090:9090"
    networks:
      - eta_network

  # ─── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: eta_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - eta_network

# ─── Named volumes ────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: eta_postgres_data
  redis_data:
    name: eta_redis_data
  neo4j_data:
    name: eta_neo4j_data
  neo4j_logs:
    name: eta_neo4j_logs
  neo4j_plugins:
    name: eta_neo4j_plugins
  prometheus_data:
    name: eta_prometheus_data
  grafana_data:
    name: eta_grafana_data
  ml_models:
    name: eta_ml_models   # persists trained ML model checkpoints

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  eta_network:
    name: eta_network
    driver: bridge
